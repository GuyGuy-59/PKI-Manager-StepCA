services:
  pki-db:
    image: postgres:16-alpine
    container_name: pki-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stepca
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_DB: stepca
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./volumes/db:/var/lib/postgresql/data
    secrets:
      - pg_password
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stepca -d stepca"]
      interval: 10s
      timeout: 5s
      retries: 5

  pki:
    image: smallstep/step-ca:latest
    hostname: pki
    container_name: pki
    user: "0:0"
    restart: unless-stopped
    depends_on:
      pki-db:
        condition: service_healthy
    environment:
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /home/step/secrets/password
    volumes:
      - ./volumes/stepca:/home/step
    ports:
      - "443:443"
    # Overrides the image's default healthcheck ("step ca health"), which needs
    # a bootstrapped ~/.step context tied to the "step" user's $HOME — absent
    # since this container runs as root (see `user` above).
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:443/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  pki-http:
    image: nginx:alpine
    container_name: pki-http
    restart: unless-stopped
    depends_on:
      - pki
      - pki-dashboard
    ports:
      - "80:80"
    volumes:
      - ./volumes/nginx/nginx-pki.conf:/etc/nginx/conf.d/default.conf:ro
      - ./volumes/nginx/intermediate_ca.crt:/etc/pki/intermediate_ca.crt:ro
    

  pki-dashboard:
    build: ./BUILD
    image: smallstep-ca-ui:latest
    container_name: pki-dashboard
    restart: unless-stopped
    depends_on:
      pki-db:
        condition: service_healthy
    volumes:
      - ./volumes/app/app.py:/app/app.py:ro
      - ./volumes/app/asgi.py:/app/asgi.py:ro
      - ./volumes/app/config.py:/app/config.py:ro
      - ./volumes/app/templates:/app/templates:ro
      - ./volumes/app/static:/app/static:ro
      # Generated by init-ca.sh; gitignored. Enables in-dashboard revocation.
      - ./volumes/stepca/secrets/revoke_jwk.json:/app/secrets/revoke_jwk.json:ro
    secrets:
      - pg_password
    

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 9000
    enable_ipv6: false
    ipam:
      config:
        - subnet: 10.40.4.0/28

secrets:
  pg_password:
    file: ./secrets/pg_password.txt
